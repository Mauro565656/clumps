# ProGuard configuration for Clumps mod

# General options
-dontoptimize
-dontshrink
-dontnote
-dontwarn

# Keep all annotations (critical for Mixins and Fabric)
-keepattributes *Annotation*,Exceptions,InnerClasses,Signature,SourceFile,LineNumberTable

# Keep Fabric mod classes
-keep class blamejared.clumps.Clumps {
    *;
}
-keep class blamejared.clumps.ClumpsClient {
    *;
}

# Keep all modules
-keep class blamejared.clumps.modules.** {
    *;
}

# Keep GUI classes
-keep class blamejared.clumps.gui.** {
    *;
}

# Keep command classes
-keep class blamejared.clumps.commands.** {
    *;
}

# Keep config classes
-keep class blamejared.clumps.ClumpsConfig {
    *;
}
-keep class blamejared.clumps.ClumpsModule {
    *;
}
-keep class blamejared.clumps.Option {
    *;
}

# Keep Mixin classes and don't obfuscate them
-keep class blamejared.clumps.mixin.** {
    *;
}
-keep @org.spongepowered.asm.mixin.Mixin class * {
    *;
}
-keep @org.spongepowered.asm.mixin.injection.Inject class * {
    *;
}
-keep @org.spongepowered.asm.mixin.injection.At class * {
    *;
}

# Keep all Mixin annotations
-keep @interface org.spongepowered.asm.mixin.**
-keep @interface org.spongepowered.asm.mixin.injection.**

# Keep Fabric API annotations and callbacks
-keep class net.fabricmc.** {
    *;
}
-keep @net.fabricmc.fabric.api.event.Event.class class * {
    *;
}

# Keep KeyMapping and related classes
-keep class blamejared.clumps.ClumpsClient$** {
    *;
}

# Don't obfuscate class names that are referenced in fabric.mod.json or mixin configs
-keepnames class blamejared.clumps.** {
    *;
}

# Keep enums
-keepclassmembers enum * {
    public static **[] values();
    public static ** valueOf(java.lang.String);
}

# Keep serializable classes
-keepclassmembers class * implements java.io.Serializable {
    static final long serialVersionUID;
    private static final java.io.ObjectStreamField[] serialPersistentFields;
    !static !transient <fields>;
    private void writeObject(java.io.ObjectOutputStream);
    private void readObject(java.io.ObjectInputStream);
    java.lang.Object writeReplace();
    java.lang.Object readResolve();
}
